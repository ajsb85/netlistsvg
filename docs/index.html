<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netlist2SVG Interactive Dashboard</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <header>
        <div>
            <h1>Netlist2SVG // WORKSTATION</h1>
            <p>SCHEMATIC_ENGINE: READY // SOURCE: <a href="https://github.com/ajsb85/netlist2svg" target="_blank">GITHUB.COM/AJSB85/NETLISTSVG</a></p>
        </div>
        <div style="text-align: right;">
            <p style="color: var(--accent-cyan); font-weight: 700;">SYSTEM STATUS: <span style="color: var(--accent-yellow);">OPERATIONAL</span></p>
            <p style="font-size: 0.7rem; opacity: 0.5;">DEPT_OF_ELECTRONICS // RD_UNIT_01</p>
        </div>
    </header>

    <div class="dashboard">
        <!-- Input Panel -->
        <div class="panel">
            <div class="panel-header">
                <div class="panel-title">Netlist Code</div>
                <div class="controls">
                    <select id="exampleSelect">
                        <option value="" disabled>Load Example...</option>
                        <option value="test/digital/up3down5.json">UP3DOWN5 (Counter)</option>
                        <option value="test/digital/generics.json">Generics (Digital)</option>
                        <option value="test/digital/mux4.json">MUX4 (Multiplexer)</option>
                        <option value="test/digital/pc.json">PC (Program Counter)</option>
                        <option value="test/analog/and.json" selected>AND Gate (Analog)</option>
                        <option value="test/analog/resistor_divider.json">Resistor Divider (Analog)</option>
                    </select>
                    <button id="formatButton" class="btn-secondary">BEAUTIFY_CODE</button>
                </div>
            </div>
            <div class="editor-wrapper">
                <textarea id="editor" placeholder="Paste your Yosys JSON netlist here..."></textarea>
            </div>
            <div style="padding: 8px 20px; font-size: 0.6rem; color: var(--text-secondary); font-family: 'JetBrains Mono', monospace; opacity: 0.5; display: flex; justify-content: space-between;">
                <span>BUFFER_STATUS: 100%</span>
                <span>ENC: UTF-8</span>
            </div>
        </div>

        <!-- Output Panel -->
        <div class="panel">
            <div class="panel-header">
                <div class="panel-title">Schematic Preview</div>
                <div class="controls">
                    <label for="skinSelect" style="font-size: 0.7rem; color: var(--text-secondary); font-family: 'JetBrains Mono', monospace;">SKIN_PROFILE:</label>
                    <select id="skinSelect"></select>
                    <button id="downloadButton" class="btn-success" style="display: none;">EXPORT_SVG</button>
                </div>
            </div>
            <div class="preview-container">
                <div id="emptyState" class="empty-state">
                    <div class="empty-state-icon">⚡</div>
                    <div>AWAITING_INPUT // STANDBY_MODE</div>
                </div>
                <img id="svgArea" alt="Rendered SVG">
            </div>
            <div style="padding: 8px 20px; font-size: 0.6rem; color: var(--text-secondary); font-family: 'JetBrains Mono', monospace; opacity: 0.5; display: flex; justify-content: space-between;">
                <span>RENDER_ENGINE: ELK_LAYERED</span>
                <span>DPI: 300_VIRTUAL</span>
            </div>
        </div>
    </div>

    <!-- Error Toast -->
    <div id="toast" class="toast"></div>

    <script type="text/javascript" src="elk.bundled.js"></script>
    <script type="text/javascript" src="bundle.js"></script>
</body>
</html>
