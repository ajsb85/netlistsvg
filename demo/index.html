<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetlistSVG Interactive Dashboard</title>
    <link rel="icon" type="image/x-icon" href="demo/favicon.ico">
    <link rel="stylesheet" href="demo/index.css">
</head>
<body>
    <header>
        <h1>NetlistSVG Interactive Dashboard</h1>
        <p>Render beautiful schematic diagrams from Yosys netlists. Powered by <a href="https://github.com/ajsb85/netlistsvg" target="_blank">NetlistSVG</a> &amp; ELK.</p>
    </header>

    <div class="dashboard">
        <!-- Input Panel -->
        <div class="panel">
            <div class="panel-header">
                <div class="panel-title">Netlist Code</div>
                <div class="controls">
                    <select id="exampleSelect">
                        <option value="" disabled>Load Example...</option>
                        <option value="test/digital/up3down5.json">UP3DOWN5 (Counter)</option>
                        <option value="test/digital/generics.json">Generics (Digital)</option>
                        <option value="test/digital/mux4.json">MUX4 (Multiplexer)</option>
                        <option value="test/digital/pc.json">PC (Program Counter)</option>
                        <option value="test/analog/and.json" selected>AND Gate (Analog)</option>
                        <option value="test/analog/resistor_divider.json">Resistor Divider (Analog)</option>
                    </select>
                    <button id="formatButton" class="btn-secondary">Format JSON</button>
                </div>
            </div>
            <div class="editor-wrapper">
                <textarea id="editor" placeholder="Paste your Yosys JSON netlist here..."></textarea>
            </div>
        </div>

        <!-- Output Panel -->
        <div class="panel">
            <div class="panel-header">
                <div class="panel-title">Schematic Preview</div>
                <div class="controls">
                    <label for="skinSelect" style="font-size: 0.85rem; color: var(--text-secondary);">Skin:</label>
                    <select id="skinSelect"></select>
                    <button id="downloadButton" class="btn-success" style="display: none;">Download SVG</button>
                </div>
            </div>
            <div class="preview-container">
                <div id="emptyState" class="empty-state">
                    <div class="empty-state-icon">⚡</div>
                    <div>Write some netlist JSON or load an example to render the schematic.</div>
                </div>
                <img id="svgArea" alt="Rendered SVG">
            </div>
        </div>
    </div>

    <!-- Error Toast -->
    <div id="toast" class="toast"></div>

    <script type="text/javascript" src="elk.bundled.js"></script>
    <script type="text/javascript" src="bundle.js"></script>
</body>
</html>
