  svg.light {
    stroke: #000 !important;
  }
  svg.light text {
    fill: #000 !important;
  }
  svg.light .splitjoinBody {
    fill: #000 !important;
  }
  svg.light .junction {
    fill: #000 !important;
  }
  svg.light .labelBackground {
    fill: #fff !important;
  }
  svg.light .detail {
    fill: #000 !important;
  }
  svg.light circle, svg.light path, svg.light rect, svg.light line {
    stroke: #000;
  }
  svg.light .subModuleOdd {
    fill: #e9e9e9 !important;
  }
  svg.light .subModuleEven {
    fill: #ffffff !important;
  }
  svg.light [style*="fill:#000"], svg.light [style*="fill:#000000"] {
    fill: #000 !important;
  }
  svg.light [style*="stroke:#000"], svg.light [style*="stroke:#000000"] {
    stroke: #000 !important;
  }</style><g s:type="resistor_v" s:width="10" s:height="50" transform="translate(17,47)" id="cell_r1"><s:alias val="r_v"/><text x="15" y="15" s:attribute="ref" class="cell_r1">r1</text><text x="15" y="30" s:attribute="value" class="cell_r1"></text><path d="M0,10 V40 H10 V10 Z" class="symbol cell_r1"/><path d="M5,0 V10 M5,40 V50" class="connect cell_r1"/><g s:x="5" s:y="0" s:pid="A" s:position="top"/><g s:x="5" s:y="50" s:pid="B" s:position="bottom"/></g><g s:type="resistor_v" s:width="10" s:height="50" transform="translate(17,137)" id="cell_r2"><s:alias val="r_v"/><text x="15" y="15" s:attribute="ref" class="cell_r2">r2</text><text x="15" y="30" s:attribute="value" class="cell_r2"></text><path d="M0,10 V40 H10 V10 Z" class="symbol cell_r2"/><path d="M5,0 V10 M5,40 V50" class="connect cell_r2"/><g s:x="5" s:y="0" s:pid="A" s:position="top"/><g s:x="5" s:y="50" s:pid="B" s:position="bottom"/></g><g s:type="vcc" s:width="20" s:height="30" transform="translate(12,12)" id="cell_vcc"><s:alias val="vcc"/><text x="10" y="-4" class="nodelabel cell_vcc" s:attribute="name"></text><path d="M0,0 H20 L10,15 Z M10,15 V30" class="cell_vcc"/><g s:x="10" s:y="30" s:pid="A" s:position="bottom"/></g><g s:type="gnd" s:width="20" s:height="30" transform="translate(12,207)" id="cell_gnd"><s:alias val="gnd"/><text x="30" y="20" class="nodelabel cell_gnd" s:attribute="name"></text><path d="M0,0 H20 M3,5 H17 M7,10 H13 M10,0 V-15" class="cell_gnd"/><g s:x="10" s:y="-15" s:pid="A" s:position="top"/></g><g s:type="outputExt" s:width="30" s:height="20" transform="translate(32,112)" id="cell_vout"><text x="15" y="-4" class="cell_vout" s:attribute="ref">vout</text><s:alias val="$_outputExt_"/><path d="M30,0 V20 H15 L0,10 15,0 Z" class="cell_vout"/><g s:x="0" s:y="10" s:pid="A" s:position="left"/></g><line x1="22" y1="42" x2="22" y2="47" class="net_2 width_1" style="stroke-width: 1"/><line x1="22" y1="97" x2="22" y2="122" class="net_3 width_1" style="stroke-width: 1"/><line x1="22" y1="122" x2="32