    fill: #e9e9e9 !important;
  }
  svg.light .subModuleEven {
    fill: #ffffff !important;
  }
  svg.light [style*="fill:#000"], svg.light [style*="fill:#000000"] {
    fill: #000 !important;
  }
  svg.light [style*="stroke:#000"], svg.light [style*="stroke:#000000"] {
    stroke: #000 !important;
