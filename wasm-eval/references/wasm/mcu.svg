<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:s="https://github.com/ajsb85/netlist2svg" width="154" height="326"><style>  svg {
    stroke: #000;
    fill: none;
  }
  text {
    fill: #000;
    stroke: none;
    font-size: 10px;
    font-weight: bold;
    font-family: "Courier New", monospace;
  }
  .nodelabel {
    text-anchor: middle;
  }
  .inputPortLabel {
    text-anchor: end;
  }
  .splitjoinBody {
    fill: #000;
  }
  .junction {
    fill: #000;
  }
  .labelBackground {
    fill: #fff;
    stroke: none;
  }
  .detail, .symbol {
    stroke-linejoin: round;
    stroke-linecap: round;
  }
  .symbol {
    stroke-width: 2;
  }
  .detail {
    fill: #000;
  }
  @media (prefers-color-scheme: dark) {
    svg {
      stroke: #fff !important;
    }
    text {
      fill: #fff !important;
    }
    .splitjoinBody {
      fill: #fff !important;
    }
    .junction {
      fill: #fff !important;
    }
    .labelBackground {
      fill: #0a192f !important; /* Blueprint background or transparent */
    }
    .detail {
      fill: #fff !important;
    }
    circle, path, rect, line {
      stroke: #fff;
    }
    [style*="fill:#000"], [style*="fill:#000000"] {
      fill: #fff !important;
    }
    [style*="stroke:#000"], [style*="stroke:#000000"] {
      stroke: #fff !important;
    }
  }
  /* Forced dark theme (used by the always-dark interactive demo). Mirrors the
     prefers-color-scheme rules above but is triggered by class="dark" on the
     root svg, so it works even when the host page/OS is not in dark mode. */
  svg.dark {
    stroke: #fff !important;
  }
  svg.dark text {
    fill: #fff !important;
  }
  svg.dark .splitjoinBody {
    fill: #fff !important;
  }
  svg.dark .junction {
    fill: #fff !important;
  }
  svg.dark .labelBackground {
    fill: #0a192f !important;
  }
  svg.dark .detail {
    fill: #fff !important;
  }
