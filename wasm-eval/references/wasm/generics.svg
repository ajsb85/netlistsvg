<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:s="https://github.com/ajsb85/netlist2svg" width="571" height="203"><style>  svg {
    stroke: #000;
    fill: none;
  }
  text {
    fill: #000;
    stroke: none;
    font-size: 10px;
    font-weight: bold;
    font-family: "Courier New", monospace;
  }
  .nodelabel {
    text-anchor: middle;
  }
  .inputPortLabel {
    text-anchor: end;
  }
  .splitjoinBody {
    fill: #000;
  }
  .junction {
    fill: #000;
  }
  .labelBackground {
    fill: #fff;
    stroke: none;
  }
  .detail, .symbol {
    stroke-linejoin: round;
    stroke-linecap: round;
  }
  .symbol {
    stroke-width: 2;
  }
  .detail {
    fill: #000;
  }
  @media (prefers-color-scheme: dark) {
    svg {
      stroke: #fff !important;
    }
    text {
      fill: #fff !important;
    }
    .splitjoinBody {
      fill: #fff !important;
    }
    .junction {
      fill: #fff !important;
    }
    .labelBackground {
      fill: #0a192f !important; /* Blueprint background or transparent */
    }
    .detail {
      fill: #fff !important;
    }
    circle, path, rect, line {
      stroke: #fff;
    }
    [style*="fill:#000"], [style*="fill:#000000"] {
      fill: #fff !important;
    }
    [style*="stroke:#000"], [style*="stroke:#000000"] {
      stroke: #fff !important;
    }
    .subModuleOdd {
      fill: #0e2238 !important;
    }
    .subModuleEven {
      fill: #16365a !important;
    }
  }
  /* Forced dark theme (used by the always-dark interactive demo). Mirrors the
     prefers-color-scheme rules above but is triggered by class="dark" on the
     root svg, so it works even when the host page/OS is not in dark mode. */
  svg.dark {
    stroke: #fff !important;
  }
  svg.dark text {
    fill: #fff !important;
  }
  svg.dark .splitjoinBody {
    fill: #fff !important;
  }
  svg.dark .junction {
    fill: #fff !important;
  }
  svg.dark .labelBackground {
    fill: #0a192f !important;
  }
  svg.dark .detail {
    fill: #fff !important;
  }
  svg.dark circle, svg.dark path, svg.dark rect, svg.dark line {
    stroke: #fff;
  }
  svg.dark .subModuleOdd {
    fill: #0e2238 !important;
  }
  svg.dark .subModuleEven {
    fill: #16365a !important;
  }
  svg.dark [style*="fill:#000"], svg.dark [style*="fill:#000000"] {
    fill: #fff !important;
  }
  svg.dark [style*="stroke:#000"], svg.dark [style*="stroke:#000000"] {
    stroke: #fff !important;
  }
  /* Forced light theme: overrides the prefers-color-scheme:dark rules above so a
     light-forced render (class="light") stays light even on a dark OS. */
  svg.light {
    stroke: #000 !important;
  }
  svg.light text {
    fill: #000 !important;
  }
  svg.light .splitjoinBody {
    fill: #000 !important;
  }
  svg.light .junction {
    fill: #000 !important;
  }
  svg.light .labelBackground {
    fill: #fff !important;
  }
  svg.light .detail {
    fill: #000 !important;
  }
  svg.light circle, svg.light path, svg.light rect, svg.light line {
    stroke: #000;
  }
  svg.light .subModuleOdd {
    fill: #e9e9e9 !important;
  }
  svg.light .subModuleEven {
    fill: #ffffff !important;
  }
  svg.light [style*="fill:#000"], svg.light [style*="fill:#000000"] {
    fill: #000 !important;
  }
  svg.light [style*="stroke:#000"], svg.light [style*="stroke:#000000"] {
    stroke: #000 !important;
  }</style><g s:type="generic" transform="translate(109,12)" s:width="30" s:height="40" id="cell_PLL"><text x="15" y="-4" class="nodelabel cell_PLL" s:attribute="ref">PLL</text><rect width="30" height="80" s:generic="body" class="cell_PLL"/><g transform="translate(0,10)" s:x="0" s:y="10" s:pid="in0" id="port_PLL~clkin"><text x="-3" y="-4" class="inputPortLabel cell_PLL">clkin</text></g><g transform="translate(30,10)" s:x="30" s:y="10" s:pid="out0" id="port_PLL~clk40"><text x="5" y="-4" style="fill:#000; stroke:none" class="cell_PLL">clk40</text></g><g transform="translate(30,30)" s:x="30" s:y="10" s:pid="out0" id="port_PLL~clk200"><text x="5" y="-4" style="fill:#000; stroke:none" class="cell_PLL">clk200</text></g><g transform="translate(30,50)" s:x="30" s:y="10" s:pid="out0" id="port_PLL~clk125"><text x="5" y="-4" style="fill:#000; stroke:none" class="cell_PLL">clk125</text></g><g transform="translate(30,70)" s:x="30" s:y="10" s:pid="out0" id="port_PLL~locked"><text x="5" y="-4" style="fill:#000; stroke:none" class="cell_PLL">locked</text></g></g><g s:type="generic" transform="translate(412,111)" s:width="30" s:height="40" id="cell_MIG"><text x="15" y="-4" class="nodelabel cell_MIG" s:attribute="ref">MIG</text><rect width="30" height="60" s:generic="body" class="cell_MIG"/><g transform="translate(0,10)" s:x="0" s:y="10" s:pid="in0" id="port_MIG~clk_ref"><text x="-3" y="-4" class="inputPortLabel cell_MIG">clk_ref</text></g><g transform="translate(0,30)" s:x="0" s:y="10" s:pid="in0" id="port_MIG~clk_sys"><text x="-3" y="-4" class="inputPortLabel cell_MIG">clk_sys</text></g><g transform="translate(0,50)" s:x="0" s:y="10" s:pid="in0" id="port_MIG~reset"><text x="-3" y="-4" class="inputPortLabel cell_MIG">reset</text></g></g><g s:type="generic" transform="translate(259,151)" s:width="30" s:height="40" id="cell_counter"><text x="15" y="-4" class="nodelabel cell_counter" s:attribute="ref">counter</text><rect width="30" height="40" s:generic="body" class="cell_counter"/><g 